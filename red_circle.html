<!DOCTYPE html>
<html>
<head>
  <title>jsPsych Experiment</title>
  <!-- jsPsych 7.3.4 CDN -->
  <script src="https://unpkg.com/jspsych@7.3.4"></script>
  <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@1.1.3"></script>
  <link href="https://unpkg.com/jspsych@7.3.4/css/jspsych.css" rel="stylesheet" type="text/css" />
  <style>
    /* 全体の背景色を灰色に設定 */
    body {
      background-color: #808080;
      color: white; /* 文字を読みやすくするために白に設定 */
    }

    /* 赤い円のスタイル定義 */
    .red-circle {
      width: 100px;
      height: 100px;
      background-color: #ff0000;
      border-radius: 50%;
      margin: 0 auto;
    }

    /* jsPsychのコンテンツコンテナを中央に維持 */
    .jspsych-content-wrapper {
      background-color: #808080;
    }
  </style>
</head>
<body></body>
<script>
  /**
   * jsPsychの初期化
   */
  const jsPsych = initJsPsych({
    on_finish: function() {
      // 実験終了時にデータを表示（デバッグ用）
      // jsPsych.data.displayData();
    }
  });

  // タイムラインの作成
  const timeline = [];

  /**
   * 1. 赤い円を表示する試行
   * html-keyboard-responseプラグインを使用
   */
  const circle_trial = {
    type: jsPsychHtmlKeyboardResponse,
    stimulus: '<div class="red-circle"></div>',
    choices: [' '], // スペースキーのみ反応
    prompt: '<p style="margin-top: 20px;">スペースキーを押すと終了します</p>',
    save_trial_parameters: {
      stimulus: true
    }
  };
  timeline.push(circle_trial);

  /**
   * 2. 終了メッセージを表示する試行
   */
  const end_trial = {
    type: jsPsychHtmlKeyboardResponse,
    stimulus: '終了しました。ご協力ありがとうございました。',
    choices: "NO_KEYS", // キー入力を受け付けない
    duration: 3000      // 3秒後に終了
  };
  timeline.push(end_trial);

  /**
   * 実験の実行
   */
  jsPsych.run(timeline);
</script>
</html>
